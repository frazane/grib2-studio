<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRIB2 Codes & Templates Browser</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      font-size: 14px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── top bar ── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      border-bottom: 1px solid #ccc;
      background: #f4f4f4;
      flex-shrink: 0;
    }
    #topbar h1 { font-size: 15px; }
    #search {
      flex: 1;
      padding: 4px 8px;
      font-family: monospace;
      font-size: 13px;
      border: 1px solid #aaa;
    }
    #tab-codes, #tab-templates {
      padding: 4px 12px;
      cursor: pointer;
      border: 1px solid #aaa;
      background: #fff;
      font-family: monospace;
    }
    #tab-codes.active, #tab-templates.active {
      background: #222;
      color: #fff;
      border-color: #222;
    }
    #status { font-size: 12px; color: #666; white-space: nowrap; }

    /* ── main layout ── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── sidebar ── */
    #sidebar {
      width: 280px;
      flex-shrink: 0;
      border-right: 1px solid #ccc;
      overflow-y: auto;
      background: #fafafa;
    }
    .sidebar-item {
      padding: 5px 10px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
      line-height: 1.4;
    }
    .sidebar-item:hover { background: #e8e8e8; }
    .sidebar-item.selected { background: #222; color: #fff; }
    .sidebar-item .table-num { font-weight: bold; }
    .sidebar-item .table-name { color: #555; font-size: 12px; display: block; }
    .sidebar-item.selected .table-name { color: #ccc; }
    .sidebar-item .entry-count {
      font-size: 11px;
      color: #999;
      float: right;
      margin-top: 2px;
    }
    .sidebar-item.selected .entry-count { color: #aaa; }

    /* ── detail panel ── */
    #detail {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    #detail h2 { font-size: 15px; margin-bottom: 4px; }
    #detail .subtitle { color: #666; font-size: 12px; margin-bottom: 14px; }

    /* ── search results ── */
    #search-results { padding: 12px 16px; overflow-y: auto; flex: 1; }
    #search-results h3 { margin-bottom: 10px; }

    /* ── tables ── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      text-align: left;
      background: #eee;
      padding: 5px 8px;
      border: 1px solid #ccc;
      font-size: 12px;
    }
    td {
      padding: 4px 8px;
      border: 1px solid #ddd;
      vertical-align: top;
    }
    tr:hover td { background: #f9f9f9; }

    .status-deprecated { color: #999; font-style: italic; }
    .status-operational { color: #333; }

    /* code/flag ref links */
    a.ref-link {
      color: #00e;
      text-decoration: underline;
      cursor: pointer;
    }

    /* subtitle groups within codeflag tables */
    .group-header td {
      background: #f0f0f0;
      font-style: italic;
      font-size: 12px;
      color: #555;
      padding: 3px 8px;
    }

    /* no-selection placeholder */
    #placeholder {
      color: #aaa;
      padding: 40px;
      text-align: center;
    }

    /* loading overlay */
    #loading {
      position: fixed; inset: 0;
      background: rgba(255,255,255,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      gap: 10px;
      z-index: 100;
    }
    #loading-bar-wrap {
      width: 300px;
      height: 8px;
      background: #ddd;
      border-radius: 4px;
      overflow: hidden;
    }
    #loading-bar {
      height: 100%;
      background: #222;
      width: 0%;
      transition: width 0.3s;
    }
    #error-msg { color: red; padding: 40px; text-align: center; display: none; }

    /* ── top-level Browser / Builder tabs ── */
    #top-tab-browser, #top-tab-builder {
      padding: 4px 12px;
      cursor: pointer;
      border: 1px solid #aaa;
      background: #fff;
      font-family: monospace;
      font-weight: bold;
      font-size: 14px;
    }
    #top-tab-browser.active, #top-tab-builder.active {
      background: #222;
      color: #fff;
      border-color: #222;
    }
    .tab-sep { width: 1px; height: 20px; background: #ccc; flex-shrink: 0; }

    /* ── browser content wrapper ── */
    #browser-content { display: flex; flex: 1; overflow: hidden; }

    /* ── builder layout ── */
    #builder-main { display: none; flex: 1; overflow: hidden; }
    #builder-sidebar {
      width: 280px;
      flex-shrink: 0;
      border-right: 1px solid #ccc;
      overflow-y: auto;
      background: #fafafa;
    }
    #builder-detail { flex: 1; overflow-y: auto; padding: 16px; }

    /* ── builder step list ── */
    .builder-step {
      padding: 8px 10px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
      line-height: 1.5;
    }
    .builder-step:hover { background: #e8e8e8; }
    .builder-step.active { background: #222; color: #fff; }
    .step-check { color: #4caf50; }
    .builder-step.active .step-check { color: #81c784; }
    .step-name { font-weight: bold; display: block; }
    .step-desc { font-size: 11px; color: #888; display: block; }
    .builder-step.active .step-desc { color: #ccc; }

    /* ── field type tags ── */
    .type-tag {
      display: inline-block;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: bold;
      margin-left: 4px;
      vertical-align: middle;
    }
    .type-unsigned  { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    .type-signed    { background: #fff9c4; color: #f57f17; border: 1px solid #fff176; }
    .type-float     { background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }
    .type-codetable { background: #f3e5f5; color: #6a1b9a; border: 1px solid #ce93d8; }

    /* ── builder form rows ── */
    .field-hint {
      font-size: 11px;
      color: #888;
      margin-left: 4px;
    }
    select { max-width: 500px; }
    input[type="number"] { width: 140px; font-family: monospace; font-size: 13px; padding: 3px 6px; border: 1px solid #aaa; }
    #builder-detail select { font-family: monospace; font-size: 13px; padding: 3px 6px; border: 1px solid #aaa; background: #fff; }

    /* ── builder navigation buttons ── */
    .builder-nav {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #eee;
    }
    .builder-nav button {
      padding: 5px 14px;
      font-family: monospace;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid #aaa;
      background: #fff;
    }
    .builder-nav button:hover { background: #f0f0f0; }
    .btn-next { background: #222 !important; color: #fff !important; border-color: #222 !important; }
    .btn-next:hover { background: #444 !important; }
    .btn-download { background: #2e7d32 !important; color: #fff !important; border-color: #2e7d32 !important; }
    .btn-download:hover { background: #388e3c !important; }
    .btn-hexdump { background: #1565c0 !important; color: #fff !important; border-color: #1565c0 !important; }
    .btn-hexdump:hover { background: #1976d2 !important; }

    /* ── hex dump ── */
    #hex-dump {
      font-family: monospace;
      font-size: 12px;
      line-height: 1.6;
      background: #f8f8f8;
      border: 1px solid #ddd;
      padding: 10px;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre;
      margin-top: 8px;
    }
    .hex-offset { color: #999; }
    .hex-byte   { color: #333; }
    .hex-ascii  { color: #666; margin-left: 8px; }
  </style>
</head>
<body>

<div id="loading">
  <div>Loading GRIB2 data from GitHub…</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-label">Fetching CodeFlag.xml…</div>
</div>

<div id="error-msg"></div>

<div id="topbar">
  <h1>GRIB2 Browser</h1>
  <button id="top-tab-browser" class="active" onclick="switchTopTab('browser')">Browser</button>
  <button id="top-tab-builder" onclick="switchTopTab('builder')">Builder</button>
  <span class="tab-sep"></span>
  <button id="tab-codes" class="browser-only active" onclick="switchTab('codes')">Code &amp; Flag Tables</button>
  <button id="tab-templates" class="browser-only" onclick="switchTab('templates')">Templates</button>
  <input id="search" class="browser-only" type="search" placeholder="Search codes, meanings, template contents…" oninput="onSearch(this.value)" />
  <span id="status"></span>
</div>

<div id="main">
  <div id="browser-content">
    <div id="sidebar"></div>
    <div id="detail"><div id="placeholder">← Select a table from the sidebar</div></div>
  </div>
  <div id="builder-main">
    <div id="builder-sidebar"></div>
    <div id="builder-detail"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// Constants
// ─────────────────────────────────────────────
const RAW_BASE = "https://raw.githubusercontent.com/wmo-im/GRIB2/master/xml/";
const CODEFLAG_URL  = RAW_BASE + "CodeFlag.xml";
const TEMPLATE_URL  = RAW_BASE + "Template.xml";

// ─────────────────────────────────────────────
// Global state
// ─────────────────────────────────────────────
let state = {
  tab: "codes",          // "codes" | "templates"
  codeTables: [],        // [{id, type, title, subTables, entries}]
  templateTables: [],    // [{id, type, title, entries}]
  codeIndex: new Map(),  // tableId -> table (for cross-ref links)
  selectedTableId: null,
  searchQuery: "",
};

// ─────────────────────────────────────────────
// XML helpers
// ─────────────────────────────────────────────
function getText(el, tag) {
  return el.querySelector(tag)?.textContent?.trim() ?? "";
}

function parseXML(text) {
  return new DOMParser().parseFromString(text, "application/xml");
}

// ─────────────────────────────────────────────
// Pre-processing: CodeFlag.xml  →  structured tables
//
// Title_en format:  "Code table 0.0 - Discipline of processed data…"
//                   "Flag table 3.3 - Resolution and component flags"
// SubTitle_en:      may indicate discipline/category sub-grouping
// ─────────────────────────────────────────────
function processCodeFlags(doc) {
  const tables = new Map();  // key: "0.0" → table object

  const entries = doc.querySelectorAll("GRIB2_CodeFlag_en");
  entries.forEach(el => {
    const rawTitle = getText(el, "Title_en");
    const m = rawTitle.match(/^(Code table|Flag table)\s+(\d+\.\d+)\s+-\s+(.+)$/i);
    if (!m) return;

    const type      = m[1].toLowerCase().includes("flag") ? "Flag table" : "Code table";
    const id        = m[2];   // e.g. "0.0"
    const tableTitle = m[3];  // e.g. "Discipline of processed data…"

    if (!tables.has(id)) {
      tables.set(id, {
        id,
        type,
        title: tableTitle,
        entries: [],
      });
    }

    tables.get(id).entries.push({
      subTitle:   getText(el, "SubTitle_en"),
      code:       getText(el, "CodeFlag"),
      meaning:    getText(el, "MeaningParameterDescription_en"),
      status:     getText(el, "Status"),
    });
  });

  // Sort tables by numeric id
  const sorted = Array.from(tables.values()).sort((a, b) => {
    const [aMaj, aMin] = a.id.split(".").map(Number);
    const [bMaj, bMin] = b.id.split(".").map(Number);
    return aMaj !== bMaj ? aMaj - bMaj : aMin - bMin;
  });

  // Build cross-reference index
  const index = new Map();
  sorted.forEach(t => index.set(t.id, t));

  return { tables: sorted, index };
}

// ─────────────────────────────────────────────
// Pre-processing: Template.xml  →  structured tables
//
// Title_en format:  "Grid definition template 3.0 - latitude/longitude"
//                   "Product definition template 4.5 - …"
// ─────────────────────────────────────────────
function processTemplates(doc) {
  const tables = new Map();

  const entries = doc.querySelectorAll("GRIB2_Template_en");
  entries.forEach(el => {
    const rawTitle = getText(el, "Title_en");

    // Match: "<Type> template <N.N> - <description>"
    const m = rawTitle.match(/^(.+?template)\s+(\d+\.\d+)\s+-\s+(.+)$/i);
    if (!m) return;

    const type       = m[1];   // e.g. "Grid definition template"
    const id         = m[2];   // e.g. "3.0"
    const tableTitle = m[3];   // e.g. "latitude/longitude"

    if (!tables.has(id)) {
      tables.set(id, {
        id,
        type,
        title: tableTitle,
        entries: [],
      });
    }

    tables.get(id).entries.push({
      octetNo:   getText(el, "OctetNo"),
      contents:  getText(el, "Contents_en"),
      note:      getText(el, "Note_en"),
      noteIDs:   getText(el, "noteIDs"),
      codeTable: getText(el, "codeTable"),
      flagTable: getText(el, "flagTable"),
      status:    getText(el, "Status"),
    });
  });

  // Sort by numeric id
  const sorted = Array.from(tables.values()).sort((a, b) => {
    const [aMaj, aMin] = a.id.split(".").map(Number);
    const [bMaj, bMin] = b.id.split(".").map(Number);
    return aMaj !== bMaj ? aMaj - bMaj : aMin - bMin;
  });

  return sorted;
}

// ─────────────────────────────────────────────
// Fetch + bootstrap
// ─────────────────────────────────────────────
async function init() {
  const loadingEl  = document.getElementById("loading");
  const barEl      = document.getElementById("loading-bar");
  const labelEl    = document.getElementById("loading-label");
  const errorEl    = document.getElementById("error-msg");

  function setProgress(pct, label) {
    barEl.style.width = pct + "%";
    labelEl.textContent = label;
  }

  try {
    setProgress(10, "Fetching CodeFlag.xml…");
    const cfText = await fetch(CODEFLAG_URL).then(r => {
      if (!r.ok) throw new Error("Failed to fetch CodeFlag.xml: " + r.status);
      return r.text();
    });

    setProgress(45, "Parsing codes & flags…");
    const cfDoc = parseXML(cfText);
    const { tables: codeTables, index: codeIndex } = processCodeFlags(cfDoc);

    setProgress(55, "Fetching Template.xml…");
    const tpText = await fetch(TEMPLATE_URL).then(r => {
      if (!r.ok) throw new Error("Failed to fetch Template.xml: " + r.status);
      return r.text();
    });

    setProgress(88, "Parsing templates…");
    const tpDoc = parseXML(tpText);
    const templateTables = processTemplates(tpDoc);

    setProgress(100, "Done.");

    state.codeTables     = codeTables;
    state.templateTables = templateTables;
    state.codeIndex      = codeIndex;

    document.getElementById("status").textContent =
      `${codeTables.length} code/flag tables · ${templateTables.length} templates`;

    loadingEl.style.display = "none";
    renderSidebar();

  } catch (err) {
    loadingEl.style.display = "none";
    errorEl.style.display = "block";
    errorEl.textContent = "Error: " + err.message +
      "\n\nNote: This file must be opened via a web server (or GitHub Pages) " +
      "due to CORS restrictions on GitHub's raw content.";
    console.error(err);
  }
}

// ─────────────────────────────────────────────
// Tab switching
// ─────────────────────────────────────────────
function switchTab(tab) {
  state.tab = tab;
  state.selectedTableId = null;
  state.searchQuery = "";
  document.getElementById("search").value = "";
  document.getElementById("tab-codes").classList.toggle("active", tab === "codes");
  document.getElementById("tab-templates").classList.toggle("active", tab === "templates");
  renderSidebar();
  renderDetail(null);
}

// ─────────────────────────────────────────────
// Sidebar rendering
// ─────────────────────────────────────────────
function currentTables() {
  return state.tab === "codes" ? state.codeTables : state.templateTables;
}

function renderSidebar(filter = "") {
  const sidebar = document.getElementById("sidebar");
  const tables = currentTables();
  const q = filter.toLowerCase();

  let html = "";
  tables.forEach(table => {
    // If searching, only show tables that have matching entries
    if (q) {
      const match = matchesQuery(table, q);
      if (!match) return;
    }
    const sel = table.id === state.selectedTableId ? " selected" : "";
    html += `<div class="sidebar-item${sel}" onclick="selectTable('${table.id}')">
      <span class="table-num">${escHtml(table.type)} ${escHtml(table.id)}</span>
      <span class="entry-count">${table.entries.length}</span>
      <span class="table-name">${escHtml(table.title)}</span>
    </div>`;
  });

  sidebar.innerHTML = html || `<div style="padding:12px;color:#aaa">No results</div>`;
}

function matchesQuery(table, q) {
  if (table.title.toLowerCase().includes(q)) return true;
  if (table.id.includes(q)) return true;
  return table.entries.some(e =>
    (e.meaning || e.contents || "").toLowerCase().includes(q) ||
    (e.code || "").toLowerCase() === q ||
    (e.code || "").toLowerCase().includes(q)
  );
}

// ─────────────────────────────────────────────
// Select a table from sidebar
// ─────────────────────────────────────────────
function selectTable(id) {
  state.selectedTableId = id;
  state.searchQuery = "";
  document.getElementById("search").value = "";
  renderSidebar();
  const table = currentTables().find(t => t.id === id);
  renderDetail(table);
}

// ─────────────────────────────────────────────
// Detail panel rendering
// ─────────────────────────────────────────────
function renderDetail(table) {
  const detail = document.getElementById("detail");
  if (!table) {
    detail.innerHTML = `<div id="placeholder">← Select a table from the sidebar</div>`;
    return;
  }

  if (state.tab === "codes") {
    detail.innerHTML = renderCodeTable(table);
  } else {
    detail.innerHTML = renderTemplateTable(table);
  }
}

function renderCodeTable(table) {
  let html = `<h2>${escHtml(table.type)} ${escHtml(table.id)} — ${escHtml(table.title)}</h2>
    <div class="subtitle">${table.entries.length} entries</div>
    <table>
      <thead><tr>
        <th style="width:100px">Code</th>
        <th>Meaning</th>
        <th style="width:90px">Status</th>
      </tr></thead>
      <tbody>`;

  let lastSubTitle = null;
  table.entries.forEach(e => {
    if (e.subTitle && e.subTitle !== lastSubTitle) {
      lastSubTitle = e.subTitle;
      html += `<tr class="group-header"><td colspan="3">${escHtml(e.subTitle)}</td></tr>`;
    }
    const statusCls = e.status === "Deprecated" ? "status-deprecated" : "status-operational";
    html += `<tr>
      <td><code>${escHtml(e.code)}</code></td>
      <td>${escHtml(e.meaning)}</td>
      <td class="${statusCls}">${escHtml(e.status)}</td>
    </tr>`;
  });

  html += `</tbody></table>`;
  return html;
}

function renderTemplateTable(table) {
  let html = `<h2>${escHtml(table.type)} ${escHtml(table.id)} — ${escHtml(table.title)}</h2>
    <div class="subtitle">${table.entries.length} octets/fields</div>
    <table>
      <thead><tr>
        <th style="width:90px">Octet(s)</th>
        <th>Contents</th>
        <th style="width:180px">Note / Reference</th>
        <th style="width:80px">Status</th>
      </tr></thead>
      <tbody>`;

  table.entries.forEach(e => {
    // Build reference cell: code table link, flag table link, note
    let ref = "";
    if (e.codeTable) {
      ref += `Code table: <a class="ref-link" onclick="goToTable('${escAttr(e.codeTable)}','codes')">${escHtml(e.codeTable)}</a>`;
    }
    if (e.flagTable) {
      if (ref) ref += "<br>";
      ref += `Flag table: <a class="ref-link" onclick="goToTable('${escAttr(e.flagTable)}','codes')">${escHtml(e.flagTable)}</a>`;
    }
    if (e.note && !e.codeTable && !e.flagTable) {
      ref = escHtml(e.note);
    } else if (e.note) {
      ref += `<br><small>${escHtml(e.note)}</small>`;
    }

    const statusCls = e.status === "Deprecated" ? "status-deprecated" : "status-operational";
    html += `<tr>
      <td><code>${escHtml(e.octetNo)}</code></td>
      <td>${escHtml(e.contents)}</td>
      <td>${ref}</td>
      <td class="${statusCls}">${escHtml(e.status)}</td>
    </tr>`;
  });

  html += `</tbody></table>`;
  return html;
}

// ─────────────────────────────────────────────
// Cross-reference navigation
// ─────────────────────────────────────────────
function goToTable(id, tab) {
  if (state.tab !== tab) {
    state.tab = tab;
    document.getElementById("tab-codes").classList.toggle("active", tab === "codes");
    document.getElementById("tab-templates").classList.toggle("active", tab === "templates");
  }
  state.selectedTableId = id;
  state.searchQuery = "";
  document.getElementById("search").value = "";
  renderSidebar();
  const table = currentTables().find(t => t.id === id);
  if (table) {
    renderDetail(table);
    // Scroll sidebar item into view
    setTimeout(() => {
      const items = document.querySelectorAll(".sidebar-item.selected");
      if (items[0]) items[0].scrollIntoView({ block: "nearest" });
    }, 50);
  } else {
    renderDetail(null);
    document.getElementById("detail").innerHTML =
      `<div style="padding:20px;color:#c00">Table ${escHtml(id)} not found.</div>`;
  }
}

// ─────────────────────────────────────────────
// Search
// ─────────────────────────────────────────────
function onSearch(query) {
  state.searchQuery = query.trim();

  if (!state.searchQuery) {
    state.selectedTableId = null;
    renderSidebar();
    renderDetail(null);
    return;
  }

  state.selectedTableId = null;
  renderSidebar(state.searchQuery);
  renderSearchResults(state.searchQuery);
}

function renderSearchResults(query) {
  const q = query.toLowerCase();
  const tables = currentTables();
  const detail = document.getElementById("detail");

  // Gather all matching entries across all tables
  let hits = [];
  tables.forEach(table => {
    table.entries.forEach(e => {
      const haystack = [
        table.type, table.id, table.title,
        e.code || "", e.meaning || "", e.contents || "", e.note || "",
      ].join(" ").toLowerCase();

      if (haystack.includes(q)) {
        hits.push({ table, entry: e });
      }
    });
  });

  if (!hits.length) {
    detail.innerHTML = `<div style="padding:20px;color:#aaa">No results for "${escHtml(query)}"</div>`;
    return;
  }

  const label = state.tab === "codes" ? "code/flag tables" : "templates";
  let html = `<h3 style="margin-bottom:12px">${hits.length} result${hits.length!==1?"s":""} for "${escHtml(query)}" across ${label}</h3>
    <table>
    <thead><tr>
      <th style="width:140px">Table</th>`;

  if (state.tab === "codes") {
    html += `<th style="width:90px">Code</th><th>Meaning</th><th style="width:90px">Status</th>`;
  } else {
    html += `<th style="width:80px">Octet(s)</th><th>Contents</th><th style="width:90px">Status</th>`;
  }
  html += `</tr></thead><tbody>`;

  hits.forEach(({ table, entry: e }) => {
    const statusCls = e.status === "Deprecated" ? "status-deprecated" : "status-operational";
    const tableRef = `<a class="ref-link" onclick="selectTable('${escAttr(table.id)}')">${escHtml(table.type)} ${escHtml(table.id)}</a>`;
    if (state.tab === "codes") {
      html += `<tr>
        <td>${tableRef}<br><small>${escHtml(table.title)}</small></td>
        <td><code>${escHtml(e.code)}</code></td>
        <td>${highlight(escHtml(e.meaning), query)}</td>
        <td class="${statusCls}">${escHtml(e.status)}</td>
      </tr>`;
    } else {
      html += `<tr>
        <td>${tableRef}<br><small>${escHtml(table.title)}</small></td>
        <td><code>${escHtml(e.octetNo)}</code></td>
        <td>${highlight(escHtml(e.contents), query)}</td>
        <td class="${statusCls}">${escHtml(e.status)}</td>
      </tr>`;
    }
  });

  html += `</tbody></table>`;
  detail.innerHTML = html;
}

// Highlight matching text
function highlight(text, query) {
  const q = escHtml(query);
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, "gi");
  return text.replace(re, `<mark>$1</mark>`);
}

// ─────────────────────────────────────────────
// Utilities
// ─────────────────────────────────────────────
function escHtml(s) {
  return (s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
function escAttr(s) {
  return (s ?? "").replace(/'/g, "\\'");
}

let topTab = "browser";

function switchTopTab(tab) {
  topTab = tab;
  document.getElementById("top-tab-browser").classList.toggle("active", tab === "browser");
  document.getElementById("top-tab-builder").classList.toggle("active", tab === "builder");

  document.querySelectorAll(".browser-only").forEach(el => {

  document.getElementById("browser-content").style.display = tab === "browser" ? "flex" : "none";
  document.getElementById("builder-main").style.display    = tab === "builder" ? "flex" : "none";

}

function builderNavHtml(stepId) {
  const prev = stepId > 0
    ? `<button onclick="goToBuilderStep(${stepId - 1})">← Previous</button>` : "";

    ? `<button class="btn-next" onclick="builderNext(${stepId})">Next →</button>` : "";

// Build a <select> from a code table + append "Code table X.X" hint
function builderCodeSelect(tableId, curVal, onchangeExpr) {
  const tbl = state.codeIndex.get(tableId);
  if (!tbl) {
    return `<input type="number" min="0" value="${curVal}" onchange="${onchangeExpr}" />
      <span class="field-hint">Code table ${escHtml(tableId)} not loaded</span>`;
  }
  let html = `<select onchange="${onchangeExpr}">`;
  tbl.entries.forEach(e => {
    const c = (e.code || "").trim();
    if (!c || c.includes("-")) return;
    if (e.status === "Deprecated") return;
    if (/^reserved$/i.test(e.meaning.trim()) || /^missing$/i.test(e.meaning.trim())) return;
    const sel = String(e.code) === String(curVal) ? " selected" : "";
    html += `<option value="${escHtml(e.code)}"${sel}>${escHtml(e.code)} — ${escHtml(e.meaning)}</option>`;
  });
  html += `</select> <span class="field-hint">Code table ${escHtml(tableId)}</span>`;
  return html;
}

// Type badge helper

    codetable: ["type-codetable", "codetable"],
    ieeefloat: ["type-float",     "IEEE float"],
    signed:    ["type-signed",    "signed"],
    unsigned:  ["type-unsigned",  "unsigned"],
  };
  const [cls, label] = map[ftype] || ["type-unsigned", "unsigned"];
  return `<span class="type-tag ${cls}">${label}</span>`;
}

// ─────────────────────────────────────────────
// Builder — Template steps helper (Sections 3, 4, 5)
// ─────────────────────────────────────────────
function renderTemplateStep(stepId, sectionKey, heading, subtitle, templatePrefix, sectionHeaderRows) {
  const bs = builderState[sectionKey];
  const templates = state.templateTables.filter(t => t.id.startsWith(templatePrefix + "."));

  // Template picker row
  let html = `
    <h2>${heading}</h2>
    <div class="subtitle">${subtitle}</div>
    ${bTableHead()}
      ${sectionHeaderRows}
      <tr>
        <td></td>
        <td>Template ${bTypeTag("codetable")}</td>
        <td><select onchange="onBuilderTemplateChange('${sectionKey}',this.value)">
          <option value="">— Select a template —</option>`;
  templates.forEach(t => {
    const sel = t.id === bs.templateId ? " selected" : "";
    html += `<option value="${t.id}"${sel}>${escHtml(t.id)} — ${escHtml(t.title)}</option>`;
  });
  html += `</select></td></tr>`;

  // Template fields
  if (bs.templateId) {
    const tmpl = state.templateTables.find(t => t.id === bs.templateId);
    if (tmpl) {
      html += `<tr><td colspan="3" style="background:#f0f0f0;font-weight:bold;font-size:12px;padding:5px 8px">
        Template ${escHtml(bs.templateId)} fields</td></tr>`;
      tmpl.entries.forEach((entry, idx) => {
        const range = parseOctetRange(entry.octetNo);
        if (range.length === 0) return;
        const tableRef = entry.codeTable || entry.flagTable;
        const ftype    = tableRef ? "codetable" : detectFieldType(entry.contents);
        const curVal   = bs.fields[idx] !== undefined ? bs.fields[idx] : 0;
        const byteCount = range.length;

        let valueCell;
        if (ftype === "codetable") {
          valueCell = builderCodeSelect(tableRef, curVal,
            `builderState['${sectionKey}'].fields[${idx}]=+this.value`);
        } else if (ftype === "ieeefloat") {
          valueCell = `<input type="number" step="any" value="${curVal}"
            onchange="builderState['${sectionKey}'].fields[${idx}]=parseFloat(this.value)||0" />
            <span class="field-hint">${byteCount} byte(s)</span>`;
        } else if (ftype === "signed") {
          const maxPos = byteCount > 0 ? Math.pow(2, byteCount * 8 - 1) - 1 : 2147483647;
          const minNeg = -maxPos - 1;
          valueCell = `<input type="number" min="${minNeg}" max="${maxPos}" value="${curVal}"
            onchange="builderState['${sectionKey}'].fields[${idx}]=+this.value" />
            <span class="field-hint">${byteCount} byte(s)</span>`;
        } else {
          const maxVal = byteCount > 0 ? Math.pow(256, byteCount) - 1 : 4294967295;
          valueCell = `<input type="number" min="0" max="${maxVal}" value="${curVal}"
            onchange="builderState['${sectionKey}'].fields[${idx}]=+this.value" />
            <span class="field-hint">${byteCount} byte(s)</span>`;
        }

        html += `<tr>
          <td><code>${escHtml(entry.octetNo)}</code></td>
          <td>${escHtml(entry.contents)} ${bTypeTag(ftype)}</td>
          <td>${valueCell}</td>
        </tr>`;
      });
    }
  }

  html += `</tbody></table>`;
  html += builderNavHtml(stepId);
  return html;
}

function onBuilderTemplateChange(sectionKey, templateId) {
  builderState[sectionKey].templateId = templateId || null;
  builderState[sectionKey].fields = {};
  renderBuilderDetail();
}

// Builder — Step 8: Build & Download
// ─────────────────────────────────────────────
function renderBuilderStep8() {
  const bs = builderState;
  const allDone = bs.s3.templateId && bs.s4.templateId && bs.s5.templateId;

  const disc0  = state.codeIndex.get("0.0");
  const discEntry = disc0 ? disc0.entries.find(e => +e.code === bs.s0.discipline) : null;
  const discLabel = discEntry ? `${bs.s0.discipline} — ${escHtml(discEntry.meaning)}` : String(bs.s0.discipline);

  const pad2 = n => String(n).padStart(2, "0");
  const refTime = `${bs.s1.year}-${pad2(bs.s1.month)}-${pad2(bs.s1.day)} ` +
                  `${pad2(bs.s1.hour)}:${pad2(bs.s1.minute)}:${pad2(bs.s1.second)} UTC`;

  const gridTpl = state.templateTables.find(t => t.id === bs.s3.templateId);
  const prodTpl = state.templateTables.find(t => t.id === bs.s4.templateId);
  const drtTpl  = state.templateTables.find(t => t.id === bs.s5.templateId);

  let html = `<h2>Build &amp; Download GRIB2 File</h2>
    <div class="subtitle">Review your selections and download the assembled GRIB2 binary.</div>`;

  if (!allDone) {
    html += `<div style="color:#c00;margin:20px 0;padding:12px;border:1px solid #c00;background:#fff0f0">
      ⚠ You must select templates for Sections 3, 4, and 5 before building.
    </div>`;
    html += `<div class="builder-nav"><button onclick="goToBuilderStep(7)">← Previous</button></div>`;
    return html;
  }

  html += `<h3 style="margin:16px 0 8px">Summary</h3>
    <table style="margin-bottom:16px">
      <thead><tr><th>Section</th><th>Choice</th></tr></thead>
      <tbody>
        <tr><td>0 — Discipline</td><td>${discLabel}</td></tr>
        <tr><td>1 — Centre</td><td>${bs.s1.originatingCentre} / Sub: ${bs.s1.originatingSubCentre}</td></tr>
        <tr><td>1 — Ref. Time</td><td>${refTime}</td></tr>
        <tr><td>3 — Grid</td><td>${bs.s3.templateId} — ${escHtml(gridTpl?.title || "")}</td></tr>
        <tr><td>4 — Product</td><td>${bs.s4.templateId} — ${escHtml(prodTpl?.title || "")}</td></tr>
        <tr><td>5 — Data Rep.</td><td>${bs.s5.templateId} — ${escHtml(drtTpl?.title || "")}</td></tr>
        <tr><td>6 — Bitmap</td><td>${bs.s6.bitmapIndicator}${bs.s6.bitmapIndicator === 255 || bs.s6.bitmapIndicator === "255" ? " (no bitmap)" : ""}</td></tr>
        <tr><td>7 — Data</td><td>Empty (no data values)</td></tr>
      </tbody>
    </table>
    <div class="builder-nav">
      <button onclick="goToBuilderStep(7)">← Previous</button>
      <button class="btn-download" onclick="downloadGrib2()">⬇ Download .grib2</button>
      <button class="btn-hexdump" onclick="toggleHexDump()">⎙ Hex Dump</button>
    </div>
    <div id="hex-dump-container" style="display:none;margin-top:16px">
      <div style="font-size:12px;color:#666;margin-bottom:4px">Hex dump of assembled GRIB2 message</div>
      <div id="hex-dump"></div>
    </div>`;
  return html;
}

// ─────────────────────────────────────────────
// Builder — binary utilities
// ─────────────────────────────────────────────
function parseOctetRange(octetStr) {
  if (!octetStr) return { start: 0, length: 0 };
  const m = String(octetStr).match(/^(\d+)(?:\s*[-–]\s*(\d+))?/);
  if (!m) return { start: 0, length: 0 };
  const start = parseInt(m[1], 10);
  const end   = m[2] ? parseInt(m[2], 10) : start;
  if (end < start) return { start: 0, length: 0 };
  return { start, length: end - start + 1 };
}

function detectFieldType(contents) {
  const s = contents || "";
  if (/reference\s*value/i.test(s) || /referenceValue/i.test(s) || /IEEE/i.test(s))
    return "ieeefloat";
  if (/\bLa1\b/.test(s) || /\bLa2\b/.test(s) || /\bLaD\b/.test(s) ||
      /\bLatin1\b/.test(s) || /\bLatin2\b/.test(s) ||
      /latitude/i.test(s) || /forecastTime/i.test(s) || /forecast\s+time/i.test(s) ||
      /scale\s*factor/i.test(s) || /scaleFactor/i.test(s) ||
      /binary\s*scale/i.test(s) || /decimal\s*scale/i.test(s) ||
      /latitude.*pole/i.test(s) || /angle.*rotation/i.test(s))
    return "signed";
  return "unsigned";
}

function writeUintN(view, offset, value, n) {
  let v = Math.round(isNaN(value) ? 0 : Math.max(0, value));
  for (let i = n - 1; i >= 0; i--) {
    view.setUint8(offset + i, v & 0xff);
    v = Math.floor(v / 256);
  }
}

function writeSintN(view, offset, value, n) {
  let v = Math.round(isNaN(value) ? 0 : value);
  const minVal = -Math.pow(2, n * 8 - 1);
  const maxVal =  Math.pow(2, n * 8 - 1) - 1;
  v = Math.max(minVal, Math.min(maxVal, v));
  if (v < 0) v += Math.pow(2, n * 8);
  writeUintN(view, offset, v, n);
}

function buildTemplateBytes(templateId, fieldValues) {
  if (!templateId) return new Uint8Array(0);
  const tmpl = state.templateTables.find(t => t.id === templateId);
  if (!tmpl) return new Uint8Array(0);

  const fields = [];
  let minOctet = Infinity;
  let maxOctet = 0;

  tmpl.entries.forEach((entry, idx) => {
    const range = parseOctetRange(entry.octetNo);
    if (range.length > 0 && range.start > 0) {
      fields.push({ ...range, entry, idx });
      minOctet = Math.min(minOctet, range.start);
      maxOctet = Math.max(maxOctet, range.start + range.length - 1);
    }
  });

  if (!fields.length || minOctet === Infinity) return new Uint8Array(0);

  const buf  = new ArrayBuffer(maxOctet - minOctet + 1);
  const view = new DataView(buf);

  fields.forEach(({ start, length, entry, idx }) => {
    const rawVal   = fieldValues[idx];
    const parsed   = (rawVal !== undefined && rawVal !== "") ? parseFloat(rawVal) : NaN;
    const value    = isNaN(parsed) ? 0 : parsed;
    const tableRef = entry.codeTable || entry.flagTable;
    const ftype    = tableRef ? "unsigned" : detectFieldType(entry.contents);
    const offset   = start - minOctet;

    if (ftype === "ieeefloat" && length === 4) {
      view.setFloat32(offset, value, false); // big-endian
    } else if (ftype === "signed") {
      writeSintN(view, offset, value, length);
    } else {
      writeUintN(view, offset, Math.max(0, value), length);
    }
  });

  return new Uint8Array(buf);
}

// ─────────────────────────────────────────────
// Builder — GRIB2 binary assembly
// ─────────────────────────────────────────────
function buildGrib2() {
  const bs = builderState;

  // Section 1 — 21 bytes
  const s1buf = new ArrayBuffer(21);
  const s1v   = new DataView(s1buf);
  writeUintN(s1v, 0, 21, 4);
  s1v.setUint8(4, 1);
  writeUintN(s1v, 5, bs.s1.originatingCentre,     2);
  writeUintN(s1v, 7, bs.s1.originatingSubCentre,  2);
  s1v.setUint8(9,  bs.s1.masterTablesVersion);
  s1v.setUint8(10, bs.s1.localTablesVersion);
  s1v.setUint8(11, bs.s1.significanceOfRefTime);
  writeUintN(s1v, 12, bs.s1.year, 2);
  s1v.setUint8(14, bs.s1.month);
  s1v.setUint8(15, bs.s1.day);
  s1v.setUint8(16, bs.s1.hour);
  s1v.setUint8(17, bs.s1.minute);
  s1v.setUint8(18, bs.s1.second);
  s1v.setUint8(19, bs.s1.productionStatus);
  s1v.setUint8(20, bs.s1.typeOfData);

  // Section 2 — 5 bytes (empty)
  const s2 = new Uint8Array([0, 0, 0, 5, 2]);

  // Section 3 — 14-byte header + template bytes
  const gridBytes = buildTemplateBytes(bs.s3.templateId, bs.s3.fields);
  const s3len = 14 + gridBytes.length;
  const s3buf = new ArrayBuffer(s3len);
  const s3v   = new DataView(s3buf);
  writeUintN(s3v, 0, s3len, 4);
  s3v.setUint8(4, 3);
  s3v.setUint8(5, bs.s3.sourceOfGridDef);
  writeUintN(s3v, 6, bs.s3.numberOfDataPoints, 4);
  s3v.setUint8(10, 0);
  s3v.setUint8(11, bs.s3.interpretationOfListOfNumbers);
  writeUintN(s3v, 12, bs.s3.templateId ? parseInt(bs.s3.templateId.split(".")[1], 10) : 0, 2);
  new Uint8Array(s3buf).set(gridBytes, 14);

  // Section 4 — 9-byte header + template bytes
  const prodBytes = buildTemplateBytes(bs.s4.templateId, bs.s4.fields);
  const s4len = 9 + prodBytes.length;
  const s4buf = new ArrayBuffer(s4len);
  const s4v   = new DataView(s4buf);
  writeUintN(s4v, 0, s4len, 4);
  s4v.setUint8(4, 4);
  writeUintN(s4v, 5, bs.s4.numberOfCoordValues, 2);
  writeUintN(s4v, 7, bs.s4.templateId ? parseInt(bs.s4.templateId.split(".")[1], 10) : 0, 2);
  new Uint8Array(s4buf).set(prodBytes, 9);

  // Section 5 — 11-byte header + template bytes
  const drtBytes = buildTemplateBytes(bs.s5.templateId, bs.s5.fields);
  const s5len = 11 + drtBytes.length;
  const s5buf = new ArrayBuffer(s5len);
  const s5v   = new DataView(s5buf);
  writeUintN(s5v, 0, s5len, 4);
  s5v.setUint8(4, 5);
  writeUintN(s5v, 5, bs.s5.numberOfPackedValues, 4);
  writeUintN(s5v, 9, bs.s5.templateId ? parseInt(bs.s5.templateId.split(".")[1], 10) : 0, 2);
  new Uint8Array(s5buf).set(drtBytes, 11);

  // Section 6 — 6 bytes
  const s6 = new Uint8Array([0, 0, 0, 6, 6, bs.s6.bitmapIndicator]);

  // Section 7 — 5 bytes (empty data)
  const s7 = new Uint8Array([0, 0, 0, 5, 7]);

  // Section 8 — "7777"
  const s8 = new Uint8Array([0x37, 0x37, 0x37, 0x37]);

  const parts   = [new Uint8Array(s1buf), s2, new Uint8Array(s3buf),
                   new Uint8Array(s4buf), new Uint8Array(s5buf), s6, s7, s8];
  const bodyLen = parts.reduce((a, p) => a + p.length, 0);
  const totalLen = 16 + bodyLen;

  // Section 0 — 16 bytes (needs total length)
  const s0buf = new ArrayBuffer(16);
  const s0v   = new DataView(s0buf);
  s0v.setUint8(0, 0x47); s0v.setUint8(1, 0x52); // "GR"
  s0v.setUint8(2, 0x49); s0v.setUint8(3, 0x42); // "IB"
  s0v.setUint8(4, 0);    s0v.setUint8(5, 0);    // reserved
  s0v.setUint8(6, bs.s0.discipline);
  s0v.setUint8(7, 2);                            // edition 2
  writeUintN(s0v, 8,  0,        4);              // high 32 bits of total length
  writeUintN(s0v, 12, totalLen, 4);              // low  32 bits of total length

  const allParts = [new Uint8Array(s0buf), ...parts];
  const result   = new Uint8Array(totalLen);
  let pos = 0;
  allParts.forEach(p => { result.set(p, pos); pos += p.length; });
  return result;
}

// ─────────────────────────────────────────────
// Builder — hex dump & download
// ─────────────────────────────────────────────
function hexDump(bytes) {
  let html = "";
  for (let i = 0; i < bytes.length; i += 16) {
    const off = i.toString(16).padStart(8, "0").toUpperCase();
    let hexPart = "";
    let asciiPart = "";
    for (let j = 0; j < 16; j++) {
      if (i + j < bytes.length) {
        const b = bytes[i + j];
        hexPart += b.toString(16).padStart(2, "0").toUpperCase() + " ";
        asciiPart += (b >= 32 && b < 127) ? String.fromCharCode(b) : ".";
      } else {
        hexPart += "   ";
        asciiPart += " ";
      }
      if (j === 7) hexPart += " ";
    }
    html += `<span class="hex-offset">${off}</span>  <span class="hex-byte">${hexPart}</span> <span class="hex-ascii">|${asciiPart}|</span>\n`;
  }
  return html;
}

function downloadGrib2() {
  const bytes = buildGrib2();
  const blob  = new Blob([bytes], { type: "application/octet-stream" });
  const url   = URL.createObjectURL(blob);
  const a     = document.createElement("a");
  a.href = url;
  a.download = "output.grib2";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function toggleHexDump() {
  const container = document.getElementById("hex-dump-container");
  const dumpEl    = document.getElementById("hex-dump");
  if (!container || !dumpEl) return;
  if (container.style.display === "none") {
    dumpEl.innerHTML = hexDump(buildGrib2());
    container.style.display = "block";
  } else {
    container.style.display = "none";
  }
}

// ─────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────
init();
</script>
